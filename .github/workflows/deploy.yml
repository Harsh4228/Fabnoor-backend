name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Start Deploy"

            cd /var/www/fabnoor/Fabnoor-backend || exit 1

            git pull origin main || exit 1

            npm install || exit 1

            pm2 restart backend || pm2 start server.js --name backend

            echo "Done"